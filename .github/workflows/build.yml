name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good

        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK
      run: |
        # 如果 buildozer.spec 不存在，创建默认配置
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        # 从 requirements.txt 更新 buildozer.spec 的 requirements
        if [ -f requirements.txt ]; then
          requirements=$(cat requirements.txt | tr '\n' ',' | sed 's/,$//')
          sed -i "s/^requirements = .*/requirements = python3,$requirements/" buildozer.spec
        fi
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-apk
        path: bin/*.apk
        retention-days: 30